#     listen 443 ssl;
#     listen [::]:443 ssl;
#     http2 on;
#     server_name broderie.ch www.broderie.ch;
#
#     ssl_certificate     /etc/letsencrypt/live/broderie.ch/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/broderie.ch/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     # HSTS — uniquement avec un VRAI certificat (jamais en auto-signé)
#     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
#
#     include /etc/nginx/snippets/broderie-common.conf;
