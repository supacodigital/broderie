# =============================================================================
#  Nginx — Reverse-proxy production « Broderie » (Au Point-Compte)
# -----------------------------------------------------------------------------
#  Architecture :  Internet → Nginx (:443 SSL) → Node/PM2 (127.0.0.1:3000)
#  Node sert l'API (/api/v1), les SPA (boutique + /admin) et /uploads,
#  donc Nginx reste un simple reverse-proxy durci (TLS, headers, cache, gzip).
#
#  Deux phases dans ce fichier :
#    • PHASE IP      → certificat auto-signé sur 179.237.87.29 (recette)
#    • PHASE DOMAINE → Let's Encrypt sur broderie.ch (bascule finale, §10)
#  Activer un seul des deux blocs « server » HTTPS à la fois.
#
#  Installation :
#    sudo cp deploy/nginx/broderie.conf /etc/nginx/sites-available/broderie
#    sudo ln -s /etc/nginx/sites-available/broderie /etc/nginx/sites-enabled/
#    sudo rm -f /etc/nginx/sites-enabled/default        # éviter le conflit default
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# -- Upstream Node/PM2 ---------------------------------------------------------
upstream broderie_backend {
    server 127.0.0.1:3000;
    keepalive 32;                      # réutilise les connexions vers Node (perf)
}

# -- Zone de rate-limiting (filet de sécurité en plus d'express-rate-limit) -----
limit_req_zone $binary_remote_addr zone=broderie_api:10m rate=20r/s;

# =============================================================================
#  Redirection HTTP → HTTPS (commune aux deux phases)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    # PHASE IP : 179.237.87.29   |   PHASE DOMAINE : broderie.ch www.broderie.ch
    server_name 179.237.87.29;

    # Laisse passer le challenge Let's Encrypt (utile en phase domaine)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
#  PHASE IP — HTTPS avec certificat AUTO-SIGNÉ (recette sur 179.237.87.29)
#  Voir DEPLOIEMENT_INFOMANIAK.md §7. Le navigateur affichera « Connexion non
#  privée » : normal en attendant le vrai certificat à la bascule.
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 179.237.87.29;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    include /etc/nginx/snippets/broderie-common.conf;
}

# =============================================================================
#  PHASE DOMAINE — HTTPS Let's Encrypt (broderie.ch) — bascule finale §10
#  Décommenter ce bloc, commenter le bloc « PHASE IP » ci-dessus, puis :
#    sudo certbot --nginx -d broderie.ch -d www.broderie.ch
#  (certbot remplit automatiquement les chemins ssl_certificate ci-dessous)
# =============================================================================
