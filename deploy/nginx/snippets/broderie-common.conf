# =============================================================================
#  Corps commun aux serveurs HTTPS (phase IP + phase domaine)
#  À déposer sur le VPS dans : /etc/nginx/snippets/broderie-common.conf
#    sudo cp deploy/nginx/snippets/broderie-common.conf /etc/nginx/snippets/
# =============================================================================

# -- TLS moderne ---------------------------------------------------------------
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# -- Upload images : 5 Mo (Multer) + marge → cohérent avec express.json 10kb / fichiers 5M
client_max_body_size 10M;

# -- Compression (en plus du middleware compression côté Express) --------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml application/wasm;

# -- Headers de sécurité (helmet gère le reste côté Node ; on double-rideau ici)
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options DENY always;
add_header Referrer-Policy strict-origin-when-cross-origin always;

# -- Logs dédiés ---------------------------------------------------------------
access_log /var/log/nginx/broderie.access.log;
error_log  /var/log/nginx/broderie.error.log;

# -----------------------------------------------------------------------------
#  Webhook Stripe — corps BRUT obligatoire (signature vérifiée par Stripe).
#  Pas de buffering, pas de réécriture : on transmet tel quel.
# -----------------------------------------------------------------------------
location = /api/v1/payments/webhook {
    proxy_pass http://broderie_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
}

# -----------------------------------------------------------------------------
#  API — proxy vers Node, avec rate-limit léger en garde-fou réseau
# -----------------------------------------------------------------------------
location /api/ {
    limit_req zone=broderie_api burst=40 nodelay;

    proxy_pass http://broderie_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";        # active le keepalive vers l'upstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;   # → app.js lit ce header (trust proxy) pour cookies Secure

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;                     # > timeout Axios client (8s), couvre les exports lourds
}

# -----------------------------------------------------------------------------
#  Images produit servies par Node (/uploads) — cache navigateur long
#  (en prod réelle elles vivent sur Infomaniak Cloud Storage ; ce bloc couvre
#   le fallback disque local éventuel et reste sans effet sinon)
# -----------------------------------------------------------------------------
location /uploads/ {
    proxy_pass http://broderie_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# -----------------------------------------------------------------------------
#  Assets buildés par Vite (hash dans le nom → immutables) — cache 1 an
#  Couvre /assets/ de la boutique et de l'admin.
# -----------------------------------------------------------------------------
location ~* ^/(admin/)?assets/ {
    proxy_pass http://broderie_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# -----------------------------------------------------------------------------
#  Tout le reste (SPA boutique + /admin + /health) → Node, qui gère le
#  fallback SPA (app.js : sendFile index.html). Pas de cache HTML.
# -----------------------------------------------------------------------------
location / {
    proxy_pass http://broderie_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
}
